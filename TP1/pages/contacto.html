<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="PixelStore, tu tienda online de videojuegos. Encontrá los mejores juegos y accesorios para gamers." />
    <link rel="stylesheet" href="../css/style.css" />
    <title>PixelStore - Inicio</title>
  </head>
  <body>

    <header>
      <h1>PixelStore</h1>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="./servicios.html">Servicios</a></li>
          <li><a href="./equipo.html">Equipo</a></li>
          <li><a href="./pedido.html">Realizar pedido</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li><a href="./faq.html">FAQ</a></li>
        </ul>
      </nav>
    </header>

    <main>
      
         <section>
            <h1>Contactanos</h1>
            <p>Contactanos para mas informacion o consultas.</p>
            <form style="width: 800px; height: 550px; padding: 50px; border: 5px solid blue; margin: 20px; background-color: rgb(130, 118, 238);" action="/destino" method="POST">
                <label style="margin: 200px 20px 200px 200px" for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                <br>
                <label style="margin: 200px 20px 200px 200px" for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>
                <br>
                <label style="margin: 200px 20px 200px 200px" for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label style="margin: 200px 2px 200px 200px" for="mensaje">Dejanos mas detalles de tu consulta</label><br>
                <textarea style="margin: 5px 20px 0px 200px; width: 400px; height: 150px;"  id="mensaje" name="mensaje"placeholder="Escribi tu opinion aca..."></textarea>
                <br>
                <br>
                <button style="margin: 2px 2px 0px 200px; width: 100px; height: 20px;" type="submit">Enviar</button> 
                <br>
                <button style="margin: 2px 2px 0px 200px; width: 100px; height: 20px;" type="reset">Resetear</button> 
            </form>
        </section>


    </main>

    <footer>
      <p> 2026 PixelStore </p>
    </footer>

  </body>
</html>
