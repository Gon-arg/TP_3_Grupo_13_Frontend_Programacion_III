<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="PixelStore, tu tienda online de videojuegos. Encontrá los mejores juegos y accesorios para gamers." />
    <link rel="stylesheet" href="../css/style.css" />
    <title>PixelStore - Inicio</title>
  </head>
  <body>

    <header>
      <h1>PixelStore</h1>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="./servicios.html">Servicios</a></li>
          <li><a href="./equipo.html">Equipo</a></li>
          <li><a href="./pedido.html">Realizar pedido</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li><a href="./faq.html">FAQ</a></li>
          <li><a href="./login.html">Login</a></li>
          <li><a href="./perfil_usuario.html">Perfil</a></li>
        </ul>
      </nav>
    </header>

    <main>
      
         <section class="contact-section">
            <h1>Contactanos</h1>
            <p>Contactanos para mas informacion o consultas.</p>
            <form class="contact-form" action="/destino" method="POST">
                <div class="contact-group">
                    <label for="nombre">Nombre:</label>
                    <input class="contact-input" type="text" id="nombre" name="nombre" required>
                </div>
                <div class="contact-group">
                    <label for="apellido">Apellido:</label>
                    <input class="contact-input" type="text" id="apellido" name="apellido" required>
                </div>
                <div class="contact-group">
                    <label for="email">Email:</label>
                    <input class="contact-input" type="email" id="email" name="email" required>
                </div>
                <div class="contact-group">
                    <label for="mensaje">Dejanos mas detalles de tu consulta</label>
                    <textarea class="contact-textarea" id="mensaje" name="mensaje" placeholder="Escribi tu opinion aca..."></textarea>
                </div>
                <div class="contact-actions">
                    <button class="contact-button" type="submit">Enviar</button>
                    <button class="contact-button contact-button--secondary" type="reset">Resetear</button>
                </div>
            </form>
        </section>


    </main>

    <footer>
      <p> 2026 PixelStore </p>
    </footer>

  </body>
</html>
