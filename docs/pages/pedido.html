<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="PixelStore, tu tienda online de videojuegos. Encontrá los mejores juegos y accesorios para gamers." />
    <link rel="stylesheet" href="../css/style.css" />
    <title>PixelStore - Pedido</title>
  </head>
  <body>

    <header>
      <h1>PixelStore</h1>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="./servicios.html">Servicios</a></li>
          <li><a href="./equipo.html">Equipo</a></li>
          <li><a href="./pedido.html">Realizar pedido</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li><a href="./faq.html">FAQ</a></li>
          <li><a href="./login.html">Login</a></li>
          <li><a href="./perfil_usuario.html">Perfil</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="page-section form-section">
        <h2>Realizar tu pedido aquí</h2>
        <p>Realiza tu pedido sobre tu juego favorito, en tu consola favorita.</p>
        <form class="form-card" action="/destino" method="POST">
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input class="form-control" type="text" id="nombre" name="nombre" required>
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input class="form-control" type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input class="form-control" type="tel" id="telefono" name="telefono" required>
          </div>
          <div class="form-group">
            <label for="provincia">Provincia:</label>
            <select class="form-control" id="provincia" name="provincia">
              <option value="ba">Buenos Aires</option>
              <option value="sf">Santa Fe</option>
              <option value="cd">Cordoba</option>
              <option value="md">Mendoza</option>
            </select>
          </div>
          <div class="form-group">
            <label for="solicitud">Tipo de solicitud:</label>
            <select class="form-control" id="solicitud" name="solicitud">
              <option value="cotizacion">Cotizacion de equipo</option>
              <option value="venta">Venta de juegos</option>
              <option value="arreglo">Arreglo de equipos</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Fecha de solicitud:</label>
            <input class="form-control" type="date" id="date" name="date" required>
          </div>
          <div class="form-group">
            <p>Turno para retiros</p>
            <label><input type="radio" name="radio" value="opcion1"> Mañana</label>
            <label><input type="radio" name="radio" value="opcion2"> Tarde</label>
          </div>
          <div class="form-group">
            <label for="resena">Dejanos mas detalles de tu pedido</label>
            <textarea class="form-control" id="resena" name="resena" placeholder="Escribi tu opinion aca..."></textarea>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Enviar</button>
          </div>
        </form>
      </section>

    </main>

    <footer>
      <p> 2026 PixelStore </p>
    </footer>

  </body>
</html>
